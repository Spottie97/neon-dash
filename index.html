                        <body>
                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dash - Browser Game</title>
    <script src="https://cdn.jsdelivr.net/npm/partysocket@1/dist/partysocket.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #score-board {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            text-align: right;
            line-height: 1.6;
        }

        #high-score-board {
            font-size: 16px;
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
        }

        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            pointer-events: auto;
            border: 1px solid #444;
        }

        h1 {
            margin: 0 0 20px 0;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            font-size: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        button {
            background: #f0f;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 10px #f0f;
            transition: transform 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff00e6;
        }

        .hidden {
            display: none !important;
        }

        #main-menu, #lobby-screen, #results-screen {
            background: rgba(0,0,0,0.88); padding: 36px 40px;
            border-radius: 10px; text-align: center;
            pointer-events: auto; border: 1px solid #444; min-width: 320px;
        }
        #main-menu input, .code-input {
            background: #000; border: 1px solid #0ff; color: #0ff;
            padding: 10px 14px; font-size: 16px;
            font-family: 'Courier New', monospace;
            width: 200px; text-align: center;
            letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px;
            display: block; margin: 0 auto 12px;
        }
        #name-input { letter-spacing: 1px; text-transform: none; }
        .mp-btn {
            display: block; width: 100%; margin: 8px 0; padding: 14px;
            background: transparent; border: 2px solid #0ff; color: #0ff;
            font-size: 16px; cursor: pointer; font-family: 'Courier New', monospace;
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 8px rgba(0,255,255,0.3); transition: all 0.15s;
        }
        .mp-btn:hover { background: #0ff; color: #000; }
        .mp-btn.danger { border-color: #f00; color: #f00; }
        .mp-btn.danger:hover { background: #f00; color: #000; }
        .mp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #room-code-display {
            font-size: 28px; color: #ff0; text-shadow: 0 0 12px #ff0;
            letter-spacing: 6px; margin: 12px 0; font-family: 'Courier New', monospace;
        }
        #player-list, #rankings-list { list-style: none; padding: 0; margin: 12px 0; text-align: left; }
        #player-list li, #rankings-list li {
            padding: 6px 10px; color: #ccc; font-size: 14px;
            border-left: 3px solid #333; margin-bottom: 4px;
        }
        #player-list li.is-me, #rankings-list li.is-me { border-color: #0ff; color: #0ff; }
        #player-list li.is-host::after { content: ' \2605'; color: #ff0; }
        #rankings-list li:first-child { border-color: #ff0; color: #ff0; }
        #limit-control { margin: 12px 0; color: #aaa; font-size: 14px; }
        #limit-control input[type=range] { width: 180px; accent-color: #0ff; }
        #opponents-sidebar {
            display: none; position: absolute; top: 0; right: -210px;
            width: 200px; height: 100%; background: rgba(0,0,0,0.85);
            border-left: 1px solid #333; padding: 16px 12px; box-sizing: border-box;
        }
        #opponents-sidebar h3 {
            color: #0ff; font-size: 12px; letter-spacing: 2px; margin: 0 0 12px 0;
        }
        .opp-card {
            padding: 8px; margin-bottom: 8px; border: 1px solid #333;
            font-size: 12px; font-family: 'Courier New', monospace;
        }
        .opp-card.alive { border-color: #0f0; }
        .opp-card.dead  { border-color: #333; opacity: 0.5; }
        .opp-name { color: #fff; margin-bottom: 4px; }
        .opp-score { color: #0ff; }
        .opp-status { float: right; }
        .opp-card.alive .opp-status { color: #0f0; }
        .opp-card.dead  .opp-status { color: #f00; }
        #sabotage-alert {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(180,0,0,0.9); color: #fff;
            padding: 12px 24px; font-size: 18px;
            font-family: 'Courier New', monospace; font-weight: bold;
            text-align: center; border: 2px solid #f00;
            box-shadow: 0 0 20px #f00; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        
        <div id="ui-layer">
            <div id="score-board">
                SCORE: 0
                <div id="high-score-board">BEST: 0</div>
            </div>
            
            <!-- MAIN MENU -->
            <div id="main-menu">
                <h1>NEON DASH</h1>
                <input id="name-input" type="text" maxlength="16" placeholder="Your name" />
                <button class="mp-btn" onclick="handleCreateRoom()">CREATE ROOM</button>
                <button class="mp-btn" onclick="handleFindMatch()">FIND MATCH</button>
                <div style="margin:10px 0;color:#444;font-size:12px;">── OR ──</div>
                <input id="code-input" class="code-input" type="text" maxlength="8" placeholder="ROOM CODE" />
                <button class="mp-btn" onclick="handleJoinRoom()">JOIN ROOM</button>
                <div style="margin-top:16px;border-top:1px solid #333;padding-top:16px;">
                    <button class="mp-btn" style="border-color:#555;color:#888;" onclick="startSoloGame()">SOLO PLAY</button>
                </div>
            </div>

            <!-- LOBBY -->
            <div id="lobby-screen" class="hidden">
                <h1 style="font-size:28px;">LOBBY</h1>
                <div style="color:#aaa;font-size:13px;">Share this code:</div>
                <div id="room-code-display">--------</div>
                <ul id="player-list"></ul>
                <div id="limit-control" class="hidden">
                    Player limit: <span id="limit-val">4</span>
                    <br><input type="range" id="limit-slider" min="2" max="10" value="4"
                        oninput="handleLimitChange(this.value)" />
                </div>
                <button class="mp-btn" id="start-btn" onclick="handleStartGame()">START GAME</button>
                <div id="waiting-msg" class="hidden" style="color:#aaa;font-size:13px;margin:8px 0;">Waiting for host&hellip;</div>
                <div id="searching-msg" class="hidden" style="color:#0af;font-size:13px;margin:8px 0;">Searching for match&hellip;</div>
                <button class="mp-btn danger" onclick="handleLeaveRoom()" style="margin-top:8px;">LEAVE</button>
            </div>

            <!-- RESULTS -->
            <div id="results-screen" class="hidden">
                <h1 style="color:#f00;text-shadow:0 0 10px #f00;">GAME OVER</h1>
                <ul id="rankings-list"></ul>
                <button class="mp-btn" onclick="handlePlayAgain()">PLAY AGAIN</button>
                <button class="mp-btn danger" onclick="handleBackToMenu()" style="margin-top:8px;">MAIN MENU</button>
            </div>

            <!-- SOLO GAME OVER -->
            <div id="start-screen" class="hidden"></div>
            <div id="game-over-screen" class="hidden">
                <h1 style="color: #f00; text-shadow: 0 0 10px #f00;">GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span><br>Best: <span id="final-high-score">0</span></p>
                <button onclick="resetGame()">Try Again</button>
                <button onclick="handleBackToMenu()" style="margin-top:8px;background:#333;box-shadow:none;">MAIN MENU</button>
            </div>
        </div>

        <div id="opponents-sidebar">
            <h3>OPPONENTS</h3>
            <div id="opp-cards"></div>
        </div>
        <div id="sabotage-alert"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-board');
        const highScoreElement = document.getElementById('high-score-board');
        const finalScoreElement = document.getElementById('final-score');
        const finalHighScoreElement = document.getElementById('final-high-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        // ── Game State ──────────────────────────────────────────────────────────
        let isPlaying = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('neonDashHighScore') || '0');
        let animationId;
        let frameCount = 0;
        let gameSpeed = 5;

        // ── New Chaos State ──────────────────────────────────────────────────────
        let powerUps = [];
        const activePowerUps = { shield: false, slowmo: 0, magnet: 0 };
        let particles = [];
        let playerTrail = [];
        let shake = 0;
        let flashTimer = 0;

        // ── Multiplayer State ────────────────────────────────────────────────────
        let socket = null;
        let myId = null;
        let myName = localStorage.getItem('neonDashName') || '';
        let roomCode = '';
        let isHost = false;
        let multiPlayers = [];       // [{id, name, score, alive, isHost}]
        let gameMode = 'solo';       // 'solo' | 'multi'
        let currentScreen = 'menu';

        // Update PARTYKIT_HOST after running: npx partykit deploy
        // const PARTYKIT_HOST = 'localhost:1999';           // local dev
        const PARTYKIT_HOST = 'neon-dash.YOURUSERNAME.partykit.dev'; // production

        // ── Player ───────────────────────────────────────────────────────────────
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 60,
            width: 30,
            height: 30,
            color: '#0ff',
            speed: 7,
            dx: 0
        };

        let obstacles = [];

        // ── Input ─────────────────────────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') player.dx = -player.speed;
            else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.dx = player.speed;
        });
        document.addEventListener('keyup', (e) => {
            if (['ArrowLeft','a','A','ArrowRight','d','D'].includes(e.key)) player.dx = 0;
        });

        // ── Draw Helpers ──────────────────────────────────────────────────────────
        function drawRect(x, y, w, h, color, glow = true) {
            ctx.fillStyle = color;
            ctx.shadowBlur = glow ? 15 : 0;
            ctx.shadowColor = color;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawCircle(x, y, r, color, glow = true) {
            ctx.fillStyle = color;
            ctx.shadowBlur = glow ? 20 : 0;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawRing(x, y, r, color, width = 2, pulse = 0) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r + pulse, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ── Pixel Art Sprites ─────────────────────────────────────────────────────
        const _ = null;

        // Player: top-down sci-fi fighter, nose up, engines down
        const PLAYER_ART = [
            [_,   _,   _,   _,   '#0cf','#0cf',_,   _,   _,   _  ],
            [_,   _,   _,   '#0cf','#0cf','#0cf','#0cf',_,   _,   _  ],
            [_,   _,   '#068','#068','#8ff','#8ff','#068','#068',_,   _  ],
            [_,   '#068','#0cf','#068','#8ff','#8ff','#068','#0cf','#068',_  ],
            ['#06f','#0cf','#0cf','#0cf','#0cf','#0cf','#0cf','#0cf','#0cf','#06f'],
            ['#06f','#0cf','#0cf','#0cf','#068','#068','#0cf','#0cf','#0cf','#06f'],
            [_,   _,   '#0cf','#0cf','#068','#068','#0cf','#0cf',_,   _  ],
            [_,   _,   '#0cf',_,   _,   _,   _,   '#0cf',_,   _  ],
            [_,   '#f80','#f80',_,   _,   _,   _,   '#f80','#f80',_  ],
            [_,   '#fa0',_,   _,   _,   _,   _,   _,   '#fa0',_  ],
        ];

        // Enemy drone: symmetric angular ship
        const ENEMY_ART = [
            [_,   _,   _,   '#f22','#f22','#f22','#f22',_,   _,   _  ],
            [_,   _,   '#f22','#800','#f22','#f22','#800','#f22',_,   _  ],
            [_,   '#f22','#800','#f60','#f60','#f60','#f60','#800','#f22',_  ],
            ['#f22','#f22','#800','#f60','#ff4','#ff4','#f60','#800','#f22','#f22'],
            ['#f22','#800','#f60','#ff4','#ff4','#ff4','#ff4','#f60','#800','#f22'],
            ['#f22','#800','#f60','#ff4','#ff4','#ff4','#ff4','#f60','#800','#f22'],
            ['#f22','#f22','#800','#f60','#ff4','#ff4','#f60','#800','#f22','#f22'],
            [_,   '#f22','#800','#f60','#f60','#f60','#f60','#800','#f22',_  ],
            [_,   _,   '#f22','#800','#f22','#f22','#800','#f22',_,   _  ],
            [_,   _,   _,   '#f22','#f22','#f22','#f22',_,   _,   _  ],
        ];

        // Shard: broken debris for split pieces
        const SHARD_ART = [
            [_,   _,   '#f60','#f60',_,   _,   _,   _,   _,   _  ],
            [_,   '#f60','#fa4','#fa4','#f60',_,   _,   _,   _,   _  ],
            ['#f60','#fa4','#840','#fa4','#f60','#f60',_,   _,   _,   _  ],
            ['#f60','#840','#840','#840','#fa4','#f60',_,   _,   _,   _  ],
            [_,   '#f60','#840','#fa4','#840','#fa4','#f60',_,   _,   _  ],
            [_,   _,   '#f60','#fa4','#840','#840','#f60',_,   _,   _  ],
            [_,   _,   _,   '#f60','#fa4','#840','#f60','#f60',_,   _  ],
            [_,   _,   _,   _,   '#f60','#f60','#840','#f60',_,   _  ],
            [_,   _,   _,   _,   _,   '#f60','#f60',_,   _,   _  ],
            [_,   _,   _,   _,   _,   _,   _,   _,   _,   _  ],
        ];

        // Power-up icons (6×6, drawn centered inside the glow ring)
        const SHIELD_ICON = [
            [_,   '#fff','#fff','#fff','#fff',_  ],
            ['#fff','#fff','#aaa','#aaa','#fff','#fff'],
            ['#fff','#aaa',_,   _,   '#aaa','#fff'],
            ['#fff','#aaa',_,   _,   '#aaa','#fff'],
            [_,   '#fff','#aaa','#aaa','#fff',_  ],
            [_,   _,   '#fff','#fff',_,   _  ],
        ];
        const CLOCK_ICON = [
            [_,   '#0af','#0af','#0af','#0af',_  ],
            ['#0af','#07a',_,   _,   '#07a','#0af'],
            ['#0af',_,   '#0af','#0af',_,   '#0af'],
            ['#0af',_,   '#0af',_,   _,   '#0af'],
            ['#0af','#07a',_,   _,   '#07a','#0af'],
            [_,   '#0af','#0af','#0af','#0af',_  ],
        ];
        const MAGNET_ICON = [
            ['#f0f','#f0f',_,   _,   '#f0f','#f0f'],
            ['#f0f','#f0f',_,   _,   '#f0f','#f0f'],
            ['#f0f','#f0f',_,   _,   '#f0f','#f0f'],
            ['#f0f','#f0f',_,   _,   '#f0f','#f0f'],
            [_,   '#f0f','#a0a','#a0a','#f0f',_  ],
            [_,   _,   '#f0f','#f0f',_,   _  ],
        ];
        const SABOTAGE_ICON = [
            [_,   _,   '#ff0','#ff0',_,   _  ],
            [_,   _,   '#ff0','#ff0','#ff0',_  ],
            [_,   '#ff0','#ff0','#ff0','#ff0',_  ],
            [_,   _,   _,   '#ff0','#ff0','#ff0'],
            [_,   _,   _,   '#ff0','#ff0',_  ],
            [_,   _,   _,   '#ff0',_,   _  ],
        ];
        const POWERUP_ICONS = { shield: SHIELD_ICON, slowmo: CLOCK_ICON, magnet: MAGNET_ICON, sabotage: SABOTAGE_ICON };

        // Draw a pixel-art sprite scaled to (w, h) at position (x, y)
        function drawSprite(art, x, y, w, h) {
            const rows = art.length, cols = art[0].length;
            const pw = w / cols, ph = h / rows;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const color = art[r][c];
                    if (!color) continue;
                    ctx.fillStyle = color;
                    ctx.fillRect((x + c * pw) | 0, (y + r * ph) | 0, Math.ceil(pw), Math.ceil(ph));
                }
            }
        }

        // ── Spawn Obstacle ────────────────────────────────────────────────────────
        function spawnObstacle() {
            const size = Math.random() * 40 + 30;
            const x = Math.random() * (canvas.width - size);
            obstacles.push({
                x, y: -size,
                width: size, height: size,
                color: '#f00',
                speed: gameSpeed + Math.random() * 2,
                spawnX: x,
                wobblePhase: Math.random() * Math.PI * 2,
                canSplit: score >= 700 && Math.random() < 0.3,
                hasSplit: false,
                speedBurstTimer: 0,
                isShard: false
            });
        }

        // ── Spawn Power-up ────────────────────────────────────────────────────────
        function spawnPowerUp() {
            const isSabotage = gameMode === 'multi' && Math.random() < 0.15;
            const types  = isSabotage ? ['sabotage'] : ['shield', 'slowmo', 'magnet'];
            const colors = { shield: '#fff', slowmo: '#0af', magnet: '#f0f', sabotage: '#ff0' };
            const labels = { shield: 'S', slowmo: 'T', magnet: 'M', sabotage: '!' };
            const type = types[Math.floor(Math.random() * types.length)];
            powerUps.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: -20, radius: 18,
                type, color: colors[type], label: labels[type], speed: 2
            });
        }

        // ── Background ────────────────────────────────────────────────────────────
        function drawBackground() {
            ctx.fillStyle = '#111';
            ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < canvas.width;  i += 40) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
            for (let i = 0; i < canvas.height; i += 40) { ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); }
            ctx.stroke();
        }

        // ── HUD: active power-up bars ─────────────────────────────────────────────
        function drawPowerUpHUD() {
            let y = 20;
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            if (activePowerUps.shield) {
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 8; ctx.shadowColor = '#fff';
                ctx.fillText('[ S ] SHIELD', 20, y);
                ctx.shadowBlur = 0;
                y += 22;
            }
            if (activePowerUps.slowmo > 0) {
                ctx.fillStyle = '#0af';
                ctx.shadowBlur = 8; ctx.shadowColor = '#0af';
                ctx.fillText('[ T ] SLOW-MO', 20, y);
                ctx.fillRect(20, y + 15, Math.round((activePowerUps.slowmo / 360) * 80), 4);
                ctx.shadowBlur = 0;
                y += 30;
            }
            if (activePowerUps.magnet > 0) {
                ctx.fillStyle = '#f0f';
                ctx.shadowBlur = 8; ctx.shadowColor = '#f0f';
                ctx.fillText('[ M ] MAGNET', 20, y);
                ctx.fillRect(20, y + 15, Math.round((activePowerUps.magnet / 480) * 80), 4);
                ctx.shadowBlur = 0;
            }
        }

        // ── Particles helper ──────────────────────────────────────────────────────
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8; ctx.shadowColor = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ── Main Update ───────────────────────────────────────────────────────────
        function update() {
            // Screen shake
            const sx = shake > 0 ? (Math.random() - 0.5) * shake * 2 : 0;
            const sy = shake > 0 ? (Math.random() - 0.5) * shake * 2 : 0;
            if (shake > 0) shake = Math.max(0, shake - 0.4);

            ctx.save();
            ctx.translate(sx, sy);

            drawBackground();

            // Slowmo blue overlay
            if (activePowerUps.slowmo > 0) {
                ctx.fillStyle = 'rgba(0,120,255,0.06)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                activePowerUps.slowmo--;
            }

            // Shield-absorb flash
            if (flashTimer > 0) {
                ctx.fillStyle = `rgba(255,255,255,${(flashTimer / 15) * 0.25})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashTimer--;
            }

            // ── Player Trail ──
            playerTrail.push({ x: player.x, y: player.y });
            if (playerTrail.length > 7) playerTrail.shift();
            playerTrail.forEach((pt, t) => {
                ctx.globalAlpha = ((t + 1) / playerTrail.length) * 0.45;
                ctx.fillStyle = '#0ff';
                ctx.fillRect(pt.x, pt.y, player.width, player.height);
            });
            ctx.globalAlpha = 1;

            // ── Move Player ──
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x + player.dx));

            // ── Player rings ──
            const pcx = player.x + player.width / 2;
            const pcy = player.y + player.height / 2;
            if (activePowerUps.magnet > 0) {
                activePowerUps.magnet--;
                drawRing(pcx, pcy, 30, '#f0f', 2, Math.sin(frameCount * 0.15) * 5);
            }
            if (activePowerUps.shield) {
                drawRing(pcx, pcy, 22, '#fff', 3);
            }

            // ── Draw Player ──
            // Engine exhaust (behind sprite so it appears under the ship)
            const exLen = 4 + Math.round(Math.abs(Math.sin(frameCount * 0.3)) * 7);
            const exAlpha = 0.5 + 0.5 * Math.abs(Math.sin(frameCount * 0.3));
            ctx.globalAlpha = exAlpha;
            ctx.shadowBlur = 14; ctx.shadowColor = '#f80';
            ctx.fillStyle = '#f80';
            ctx.fillRect(player.x + 3,                    player.y + player.height, 6, exLen);
            ctx.fillRect(player.x + player.width - 9,     player.y + player.height, 6, exLen);
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            // Ship sprite with cyan outer glow
            ctx.shadowBlur = 10; ctx.shadowColor = '#0cf';
            drawSprite(PLAYER_ART, player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            // ── Spawn Logic ──
            frameCount++;
            if (frameCount % Math.floor(600 / (gameSpeed * 2 + 1)) === 0) spawnObstacle();
            if (frameCount % 240 === 0 && Math.random() < 0.4) spawnPowerUp();

            const speedMult = activePowerUps.slowmo > 0 ? 0.35 : 1;

            // ── Update Power-ups ──
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];

                // Magnet pull
                if (activePowerUps.magnet > 0) {
                    const dx = pcx - pu.x, dy = pcy - pu.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 1) { pu.x += (dx / dist) * 4; pu.y += (dy / dist) * 4; }
                }

                pu.y += pu.speed * speedMult;

                // Draw power-up circle
                ctx.shadowBlur = 20; ctx.shadowColor = pu.color;
                ctx.strokeStyle = pu.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(pu.x, pu.y, pu.radius, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
                // Pixel art icon centered in ring
                const iconSize = pu.radius * 1.4;
                drawSprite(POWERUP_ICONS[pu.type],
                    pu.x - iconSize / 2, pu.y - iconSize / 2, iconSize, iconSize);

                // Pickup
                const dx = pcx - pu.x, dy = pcy - pu.y;
                if (Math.sqrt(dx * dx + dy * dy) < 15 + pu.radius) {
                    if (pu.type === 'shield')  activePowerUps.shield = true;
                    if (pu.type === 'slowmo')  activePowerUps.slowmo = 360;
                    if (pu.type === 'magnet')  activePowerUps.magnet = 480;
                    if (pu.type === 'sabotage' && gameMode === 'multi') {
                        sendToServer({ type: 'sabotage' });
                        showSabotageAlert('\u26A1 SABOTAGE SENT!', '#ff0', 1500);
                    }
                    powerUps.splice(i, 1);
                    continue;
                }
                if (pu.y - pu.radius > canvas.height) powerUps.splice(i, 1);
            }

            // ── Update Obstacles ──
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];

                // Tier 1 – Wobble (300+)
                if (score >= 300) {
                    obs.wobblePhase += 0.05;
                    obs.x = Math.max(0, Math.min(canvas.width - obs.width,
                        obs.spawnX + Math.sin(obs.wobblePhase) * 40));
                }

                // Tier 3 – Frenzy color & speed burst (1500+)
                let extraSpeed = 0;
                if (score >= 1500) {
                    if (Math.random() < 0.002) obs.speedBurstTimer = 20;
                    if (obs.speedBurstTimer > 0) { extraSpeed = obs.speed * 0.8; obs.speedBurstTimer--; }
                    const t = ((Date.now() / 300) + obs.wobblePhase) % 3;
                    obs.color = t < 1 ? '#f00' : t < 2 ? '#ff6600' : '#ffee00';
                }

                obs.y += (obs.speed + extraSpeed) * speedMult;

                // Tier 2 – Split (700+)
                if (obs.canSplit && !obs.hasSplit && obs.y >= 380) {
                    obs.hasSplit = true;
                    const half = obs.width * 0.65;
                    for (const side of [-1, 1]) {
                        const nx = obs.x + side * (obs.width * 0.5 + 6);
                        obstacles.push({
                            x: nx, y: obs.y,
                            width: half, height: half,
                            color: '#ff6600',
                            speed: obs.speed * 1.3,
                            spawnX: nx,
                            wobblePhase: Math.random() * Math.PI * 2,
                            canSplit: false, hasSplit: false, speedBurstTimer: 0,
                            isShard: true
                        });
                    }
                    obstacles.splice(i, 1);
                    continue;
                }

                // Draw obstacle sprite
                const glowColor = obs.isShard ? '#f60' : '#f22';
                ctx.shadowBlur = 10; ctx.shadowColor = glowColor;
                drawSprite(obs.isShard ? SHARD_ART : ENEMY_ART, obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;
                // Frenzy tint overlay
                if (score >= 1500) {
                    ctx.globalAlpha = 0.35;
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.globalAlpha = 1;
                }

                // Collision
                if (player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                    if (activePowerUps.shield) {
                        activePowerUps.shield = false;
                        flashTimer = 15;
                        shake = 5;
                        obstacles.splice(i, 1);
                        continue;
                    }
                    ctx.restore();
                    gameOver();
                    return;
                }

                // Off-screen → score
                if (obs.y > canvas.height) {
                    // Near-miss shake
                    const hDist = Math.max(obs.x - (player.x + player.width), player.x - (obs.x + obs.width));
                    if (hDist < 35) shake = Math.max(shake, 2);

                    obstacles.splice(i, 1);
                    score += 10;
                    scoreElement.firstChild.textContent = 'SCORE: ' + score;
                    if (score % 100 === 0) gameSpeed += 0.5;
                    if (gameMode === 'multi') {
                        if (score % 50 === 0) sendToServer({ type: 'score', score });
                        if (score % 100 === 0) sendToServer({ type: 'auto-sabotage' });
                    }
                }
            }

            updateParticles();
            drawPowerUpHUD();
            ctx.restore();
        }

        // ── Game Loop ─────────────────────────────────────────────────────────────
        function gameLoop() {
            if (isPlaying) {
                update();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // ── Screen Management ────────────────────────────────────────────────────
        const SCREEN_IDS = ['main-menu','lobby-screen','results-screen','start-screen','game-over-screen'];

        function showScreen(id) {
            SCREEN_IDS.forEach(s => document.getElementById(s)?.classList.add('hidden'));
            if (id) document.getElementById(id)?.classList.remove('hidden');
            currentScreen = id || 'game';
        }

        function esc(str) {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function getNameFromInput() {
            const raw = (document.getElementById('name-input')?.value || '').trim();
            myName = raw || 'Player';
            localStorage.setItem('neonDashName', myName);
            return myName;
        }

        function startSoloGame() {
            gameMode = 'solo';
            document.getElementById('opponents-sidebar').style.display = 'none';
            showScreen(null);
            startGame();
        }

        // ── Start / Reset ─────────────────────────────────────────────────────────
        function startGame() {
            showScreen(null);
            document.getElementById('opponents-sidebar').style.display = 'none';
            isPlaying = true;
            score = 0; gameSpeed = 5; frameCount = 0;
            obstacles = []; powerUps = []; particles = []; playerTrail = [];
            shake = 0; flashTimer = 0;
            activePowerUps.shield = false; activePowerUps.slowmo = 0; activePowerUps.magnet = 0;
            player.x = canvas.width / 2 - 15; player.dx = 0;
            scoreElement.firstChild.textContent = 'SCORE: 0';
            highScoreElement.textContent = 'BEST: ' + highScore;
            gameLoop();
        }

        function resetGame() { startGame(); }

        // ── Game Over + Death Animation ───────────────────────────────────────────
        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            if (gameMode === 'multi') sendToServer({ type: 'death', finalScore: score });
            shake = 12;

            // Burst particles from player
            const cx = player.x + player.width / 2;
            const cy = player.y + player.height / 2;
            for (let i = 0; i < 24; i++) {
                const angle = (i / 24) * Math.PI * 2;
                const spd = Math.random() * 5 + 2;
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 3,
                    life: 45, maxLife: 45, color: '#0ff'
                });
            }

            // Brief death animation loop (45 frames)
            let frame = 0;
            function deathAnim() {
                if (frame++ >= 45) {
                    if (gameMode === 'multi') {
                        // Results arrive via server game-end message — nothing to do here
                    } else {
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('neonDashHighScore', highScore);
                            highScoreElement.textContent = 'BEST: ' + highScore;
                        }
                        finalScoreElement.innerText = score;
                        finalHighScoreElement.innerText = highScore;
                        gameOverScreen.classList.remove('hidden');
                    }
                    return;
                }
                const sx = shake > 0 ? (Math.random() - 0.5) * shake * 2 : 0;
                const sy = shake > 0 ? (Math.random() - 0.5) * shake * 2 : 0;
                if (shake > 0) shake = Math.max(0, shake - 0.4);

                ctx.save();
                ctx.translate(sx, sy);
                drawBackground();
                updateParticles();
                ctx.restore();
                requestAnimationFrame(deathAnim);
            }
            deathAnim();
        }

        // ── WebSocket ────────────────────────────────────────────────────────────
        function connectToRoom(code) {
            if (socket) { socket.close(); socket = null; }
            roomCode = code.toUpperCase();
            socket = new PartySocket({ host: PARTYKIT_HOST, room: roomCode });
            socket.onopen = () => socket.send(JSON.stringify({ type: 'join', name: myName }));
            socket.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
            socket.onclose = () => { if (currentScreen === 'lobby-screen') showScreen('main-menu'); };
        }

        function connectToMatchmaking() {
            if (socket) { socket.close(); socket = null; }
            socket = new PartySocket({ host: PARTYKIT_HOST, room: 'matchmaking' });
            socket.onopen = () => socket.send(JSON.stringify({ type: 'find-match', name: myName }));
            socket.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
        }

        function sendToServer(msg) {
            if (socket && socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify(msg));
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'room-joined':
                    myId = msg.yourId;
                    isHost = msg.players.find(p => p.id === myId)?.isHost || false;
                    multiPlayers = msg.players;
                    roomCode = msg.roomCode;
                    showLobby();
                    break;
                case 'player-joined':
                    multiPlayers.push(msg.player);
                    renderLobbyPlayers();
                    break;
                case 'player-left':
                    multiPlayers = multiPlayers.filter(p => p.id !== msg.playerId);
                    renderLobbyPlayers();
                    renderOpponentsSidebar();
                    break;
                case 'limit-changed':
                    document.getElementById('limit-val').textContent = msg.limit;
                    document.getElementById('limit-slider').value = msg.limit;
                    break;
                case 'game-start':
                    gameMode = 'multi';
                    showScreen(null);
                    document.getElementById('opponents-sidebar').style.display = 'block';
                    startGame();
                    break;
                case 'score-update': {
                    const p = multiPlayers.find(p => p.id === msg.playerId);
                    if (p) p.score = msg.score;
                    renderOpponentsSidebar();
                    break;
                }
                case 'player-died': {
                    const p = multiPlayers.find(p => p.id === msg.playerId);
                    if (p) { p.alive = false; p.score = msg.finalScore; }
                    renderOpponentsSidebar();
                    break;
                }
                case 'sabotage-incoming':
                    receiveSabotage(msg.kind, msg.fromName);
                    break;
                case 'game-end':
                    showResults(msg.rankings);
                    break;
                case 'matched':
                    socket.close();
                    connectToRoom(msg.roomCode);
                    break;
                case 'queued':
                    document.getElementById('searching-msg')?.classList.remove('hidden');
                    break;
                case 'error':
                    alert(msg.message);
                    break;
            }
        }

        // ── Lobby ────────────────────────────────────────────────────────────────
        function showLobby() {
            showScreen('lobby-screen');
            document.getElementById('room-code-display').textContent = roomCode;
            document.getElementById('limit-control').classList.toggle('hidden', !isHost);
            document.getElementById('start-btn').classList.toggle('hidden', !isHost);
            document.getElementById('waiting-msg').classList.toggle('hidden', isHost);
            document.getElementById('searching-msg').classList.add('hidden');
            renderLobbyPlayers();
        }

        function renderLobbyPlayers() {
            const ul = document.getElementById('player-list');
            ul.textContent = '';
            multiPlayers.forEach(p => {
                const li = document.createElement('li');
                if (p.id === myId) li.classList.add('is-me');
                if (p.isHost)      li.classList.add('is-host');
                li.textContent = p.name + (p.id === myId ? ' (you)' : '');
                ul.appendChild(li);
            });
        }

        function renderOpponentsSidebar() {
            const container = document.getElementById('opp-cards');
            if (!container) return;
            container.textContent = '';
            multiPlayers.filter(p => p.id !== myId).forEach(p => {
                const card = document.createElement('div');
                card.className = 'opp-card ' + (p.alive ? 'alive' : 'dead');
                const status = document.createElement('span');
                status.className = 'opp-status';
                status.textContent = p.alive ? '\u25CF' : '\u2715';
                const name = document.createElement('div');
                name.className = 'opp-name';
                name.textContent = p.name;
                const score = document.createElement('div');
                score.className = 'opp-score';
                score.textContent = p.score + ' pts';
                card.appendChild(status);
                card.appendChild(name);
                card.appendChild(score);
                container.appendChild(card);
            });
        }

        function showResults(rankings) {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('opponents-sidebar').style.display = 'none';
            const ul = document.getElementById('rankings-list');
            ul.textContent = '';
            const medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
            rankings.forEach((p, i) => {
                const li = document.createElement('li');
                if (p.id === myId) li.classList.add('is-me');
                li.textContent = (medals[i] || (i + 1) + '.') + ' ' + p.name + (p.id === myId ? ' (you)' : '') + ' \u2014 ' + p.score + ' pts';
                ul.appendChild(li);
            });
            showScreen('results-screen');
        }

        // ── Navigation Handlers ──────────────────────────────────────────────────
        function handleCreateRoom() {
            getNameFromInput();
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            const code = Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            connectToRoom(code);
        }

        function handleJoinRoom() {
            getNameFromInput();
            const code = (document.getElementById('code-input')?.value || '').trim().toUpperCase();
            if (code.length < 4) { alert('Enter a valid room code'); return; }
            connectToRoom(code);
        }

        function handleFindMatch() {
            getNameFromInput();
            showScreen('lobby-screen');
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('limit-control').classList.add('hidden');
            document.getElementById('waiting-msg').classList.add('hidden');
            document.getElementById('searching-msg').classList.remove('hidden');
            document.getElementById('room-code-display').textContent = 'MATCHING\u2026';
            connectToMatchmaking();
        }

        function handleLimitChange(val) {
            document.getElementById('limit-val').textContent = val;
            sendToServer({ type: 'set-limit', limit: parseInt(val) });
        }

        function handleStartGame() { sendToServer({ type: 'start' }); }

        function handleLeaveRoom() {
            socket?.close(); socket = null;
            multiPlayers = [];
            showScreen('main-menu');
        }

        function handlePlayAgain() {
            if (gameMode === 'multi') {
                multiPlayers = multiPlayers.map(p => ({ ...p, alive: false, score: 0 }));
                showLobby();
            } else {
                startSoloGame();
            }
        }

        function handleBackToMenu() {
            socket?.close(); socket = null;
            multiPlayers = []; gameMode = 'solo';
            showScreen('main-menu');
        }

        // ── Sabotage ─────────────────────────────────────────────────────────────
        function receiveSabotage(kind, fromName) {
            const count = kind === 'bomb' ? 5 : 2;
            shake = Math.max(shake, 6);
            showSabotageAlert('\u26A1 ' + (kind === 'bomb' ? 'BOMB' : 'HIT') + ' from ' + fromName + '!', '#f00', 2000);
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (!isPlaying) return;
                    const size = 30 + Math.random() * 20;
                    const nx = Math.random() * (canvas.width - size);
                    obstacles.push({
                        x: nx, y: -size, width: size, height: size,
                        color: '#f00', speed: (gameSpeed + 4) * 1.5,
                        spawnX: nx, wobblePhase: Math.random() * Math.PI * 2,
                        canSplit: false, hasSplit: false, speedBurstTimer: 0, isShard: false
                    });
                }, i * 180);
            }
        }

        function showSabotageAlert(text, color, duration) {
            const el = document.getElementById('sabotage-alert');
            el.textContent = text;
            el.style.borderColor = color;
            el.style.boxShadow = '0 0 20px ' + color;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, duration);
        }

        // ── Initial Draw ──────────────────────────────────────────────────────────
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        highScoreElement.textContent = 'BEST: ' + highScore;
        if (myName) document.getElementById('name-input').value = myName;
        showScreen('main-menu');

    </script>
